<div class="personal-area-container">
    <div class="greeting-section">
        <h1 class="welcome-text">Welcome, <span id="display-username">...</span>!</h1>
        <p class="dashboard-subtext">This is your private dashboard.</p>
    </div>

    <div class="settings-card">
        <h2 class="settings-title">Settings</h2>
        <div class="avatar-display-section">
            <label class="upload-label">Current Avatar:</label>
            <img src="/img/default-avatar.png" id="display-profile-pic" class="current-avatar" alt="Avatar">
        </div>
        <div class="upload-form-section">
            <label for="pic-upload" class="upload-label">Update Profile Picture:</label>
            <input type="file" id="pic-upload" accept="image/*">
            <button class="nav-btn upload-submit-btn" onclick="uploadPic()">Upload</button>
        </div>
    </div>

    <div class="status-section">
        <p>Status: <strong class="verified-text">Verified</strong></p>
    </div>

    <div class="logout-section">
        <button class="logout-btn" onclick="handleLogout()">Log Out</button>
    </div>
</div>
