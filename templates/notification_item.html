<div class="notification-item {unread-class}" data-notification-id="{id}" onclick="handleNotificationClick('{target-url}', '{id}')">
    <img src="{avatar-url}" alt="Avatar" class="notif-avatar">
    <div class="notif-content">
        <p><strong>{username}</strong> commented on your post: "{comment-text}"</p>
        <span class="notif-time">{time-ago}</span>
    </div>
</div>
