<!DOCTYPE html>
<html lang="en">
	<head>
		<base href="/">
		<meta charset="UTF-8">
		<title>Do It!</title>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
		<link rel="stylesheet" th:href="@{/css/style.css}">
		<link rel="stylesheet" th:href="@{/css/auth.css}">
		<link rel="stylesheet" th:href="@{/css/notifications.css}">
		<link rel="stylesheet" th:href="@{/css/profile.css}">
		<link rel="stylesheet" th:href="@{/css/posts.css}">
	</head>
	<body>
		<nav class="navbar">
			<div class="nav-container">
				<div class="nav-section left">
					<div id="logged-in-nav" style="display: none;">
						<button class="nav-icon-btn" onclick="goToMyPublicProfile()" title="My Profile">
							<i class="fas fa-user-circle"></i>
						</button>
					</div>
					<div id="nav-clock" class="nav-clock">00:00:00</div>
				</div>

				<div class="nav-section center">
					<h1 class="nav-logo" onclick="navigateTo('home')">Do It!</h1>
				</div>

				<div class="nav-section right">
					<div class="notification-wrapper" id="notification-wrapper">
						<button class="nav-icon-btn" id="btn-notifications" title="Notifications" onclick="toggleNotificationDropdown(event)">
							<i class="fas fa-bell"></i>
							<span class="notification-badge" id="notification-badge" style="display: none;">0</span>
						</button>

						<div class="notification-dropdown" id="notification-dropdown" style="display: none;"></div>
					</div>

					<button class="nav-icon-btn" id="btn-user" title="User Center"></button>
				</div>
			</div>
		</nav>

		<main id="main-content"></main>

		<script src="/js/config.js"></script>
		<script src="/js/toast.js"></script>
		<script src="/js/clock.js"></script>
		<script src="/js/auth.js"></script>
		<script src="/js/navigation.js"></script>
		<script src="/js/password_visibility.js"></script>
		<script src="/js/process_data.js"></script>
		<script src="/js/password_strength.js"></script>
		<script src="/js/posts.js"></script>
		<script src="/js/profile.js"></script>
		<script src="/js/comments.js"></script>
		<script src="/js/notifications.js"></script>
	</body>
</html>
